<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigPlanetarium | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen" class="overlay">
        <!--Loading icon at the bottom right-->
        <video id="vid" autoplay loop muted playsinline class="mini">
            <source src="assets/vid.mp4" type="video/mp4">
        </video>

        <main class="center">
            <!--Loading Title Screen-->
            <h1 class="title">Looking through the telescope</h1>
            <div id="km" class="distance" aria-live="polite">
                <!--Visual loader-->
                0 KM
            </div>
            <p id="status" class="note">GETTING READY...</p>
        </main>

        <footer class="footer">
            <!--Bottom fun facts-->
            <h2 class="label">Did you know?</h2>
            <div class="wrap">
                <p id="fact" class="text" aria-live="polite">Space is waiting for you!</p>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
