<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BigPlanetarium | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-tint"></div>
    <video autoplay muted loop playsinline id="bg-video" class="bg-fade-in">
        <source src="bg/bg.mp4" type="video/mp4">
    </video>

    <div id="signin-box" class="hologram-card">
        <div id="handle" class="drag-handle">⋮⋮ USER ACCESS ⋮⋮</div>
        <div class="content">
            <h1 class="main-title">SIGN IN</h1>
            <p class="subtitle">!! Please enter your details to keep the data you have !!</p>
            
            <input type="text" placeholder="USERNAME" class="input-field">
            <input type="password" placeholder="PASSWORD" class="input-field">
            
            <button class="btn-primary" onclick="window.location.href='../home.html'">SIGN IN</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-google" onclick="window.location.href='../home.html'">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                CONTINUE WITH GOOGLE
            </button>
            
            <a href="../home.html" class="guest-link">CONTINUE AS GUEST</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
