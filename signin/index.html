<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigPlanetarium | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tint"></div>
    <video autoplay muted loop playsinline id="video">
        <source src="bg/signinbg.mp4" type="video/mp4">
    </video>

    <div id="box" class="card">
        <div id="top" class="grab">⋮⋮ USER ACCESS ⋮⋮</div>
        <div class="body">
            <h1 class="header">SIGN IN</h1>
            <p class="note">!! Please enter your details to keep the data you have !!</p>
            
            <input type="text" placeholder="USERNAME" class="field">
            <input type="password" placeholder="PASSWORD" class="field">
            
            <button class="login" onclick="window.location.href='../home/index.html'">SIGN IN</button>
            
            <div class="line">OR</div>
            
            <button class="google" onclick="window.location.href='../home/index.html'">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                CONTINUE WITH GOOGLE
            </button>
            
            <a href="../home/index.html" class="guest">CONTINUE AS GUEST</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
